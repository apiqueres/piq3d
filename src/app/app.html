<header class="site-header">
  <div class="brand">
    <a routerLink="/inicio" class="brand__logo">piq<span>3d</span></a>
    <div class="brand__tag">custom 3d studio</div>
  </div>

  <button class="menu-toggle" type="button" (click)="toggleMenu()" aria-label="Abrir menú">
    ☰
  </button>

  <nav class="main-nav" [class.is-open]="menuOpen">
    <a routerLink="/inicio" routerLinkActive="active" (click)="menuOpen=false">Inicio</a>
    <a routerLink="/productos" routerLinkActive="active" (click)="menuOpen=false">Productos</a>
    <a routerLink="/contacto" routerLinkActive="active" (click)="menuOpen=false">Contacto</a>
    <a routerLink="/coming-soon-mascota" routerLinkActive="active" (click)="menuOpen=false">Personaliza tu mascota</a>
  </nav>
</header>

<main class="site-shell">
  <router-outlet></router-outlet>
</main>

<footer class="site-footer">
  <div class="site-footer__inner">
    <div class="site-footer__brand">PIQ3D</div>
    <div class="site-footer__links">
      <a routerLink="/inicio">Inicio</a>
      <a routerLink="/productos">Productos</a>
      <a routerLink="/contacto">Contacto</a>
      <a routerLink="/coming-soon-mascota">Personaliza tu mascota</a>
    </div>
    <div class="site-footer__copy">© 2026 PIQ3D · Diseño e impresión 3D</div>
  </div>
</footer>
