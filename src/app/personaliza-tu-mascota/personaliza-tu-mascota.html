<section class="pet-customizer">
  <div class="hero">
    <p class="eyebrow">PIQ3D · FIGURITAS PERSONALIZADAS</p>
    <h1>Visualiza a tu perrito en su próxima figurita 3D</h1>
    <p>
      Sube tu idea, combina estilos y descubre en segundos cómo quedará tu mascota en una pieza
      única hecha por PIQ3D.
    </p>
  </div>

  <div class="cta-wrap cta-wrap--top">
    <a routerLink="/contacto" class="cta-btn">personaliza el tuyo</a>
  </div>

  <div class="gallery" aria-label="Galería de figuritas de perritos">
    <article class="card card--big">
      <img ngSrc="assets/mascotas1.png" width="720" height="720" alt="Figurita perrito estilo realista" priority />
    </article>

    <article class="card">
      <img ngSrc="assets/sofi.png" width="500" height="500" alt="Figurita personalizada de Sofi" />
    </article>

    <article class="card">
      <img ngSrc="assets/colette.png" width="500" height="500" alt="Figurita personalizada de Colette" />
    </article>

    <article class="card">
      <img ngSrc="assets/vogan.png" width="500" height="500" alt="Figurita personalizada de Vogan" />
    </article>

    <article class="card">
      <img ngSrc="assets/XALI.png" width="500" height="500" alt="Figurita personalizada de Xali" />
    </article>
  </div>

  <form class="pet-form" aria-label="Formulario de personalización de figurita">
    <h2>Cuéntanos cómo quieres tu figurita</h2>

    <div class="field">
      <label for="fotoMascota">Sube una foto de tu mascota *</label>
      <input id="fotoMascota" name="fotoMascota" type="file" accept="image/*" required />
    </div>

    <div class="field-grid">
      <div class="field">
        <label for="nombreMascota">Nombre de tu mascota</label>
        <input id="nombreMascota" name="nombreMascota" type="text" placeholder="Ejemplo: Luna" />
      </div>

      <div class="field">
        <label for="cantidadFiguritas">Cantidad de figuritas *</label>
        <input id="cantidadFiguritas" name="cantidadFiguritas" type="number" min="1" placeholder="1" required />
      </div>
    </div>

    <div class="field">
      <label for="observaciones">Observaciones</label>
      <textarea
        id="observaciones"
        name="observaciones"
        rows="4"
        placeholder="Color del collar, tamaño, estilo o cualquier detalle especial"
      ></textarea>
    </div>

    <button type="submit" class="generate-btn">genera tu figurita</button>
  </form>
</section>
